suite: pdb
templates:
  - templates/pdb.yaml

tests:
  - it: renders PDB with default values
    set:
      podDisruptionBudget.enabled: true
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: metadata.name
          value: RELEASE-NAME-stellar-operator
      - equal:
          path: spec.minAvailable
          value: 1
      - notExists:
          path: spec.maxUnavailable
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: stellar-operator
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: does not render PDB when disabled
    set:
      podDisruptionBudget.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: uses custom minAvailable value
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: 2
    asserts:
      - equal:
          path: spec.minAvailable
          value: 2
      - notExists:
          path: spec.maxUnavailable

  - it: uses percentage-based minAvailable
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: "50%"
    asserts:
      - equal:
          path: spec.minAvailable
          value: "50%"

  - it: uses maxUnavailable when set
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: null
      podDisruptionBudget.maxUnavailable: 1
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 1
      - notExists:
          path: spec.minAvailable

  - it: uses maxUnavailable for validator nodes (default to 1)
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: null
      podDisruptionBudget.maxUnavailable: 1
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: spec.maxUnavailable
          value: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-stellar-operator

  - it: supports both minAvailable and maxUnavailable but only one should be used
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: 1
      podDisruptionBudget.maxUnavailable: 1
    asserts:
      - equal:
          path: spec.minAvailable
          value: 1
      - equal:
          path: spec.maxUnavailable
          value: 1

  - it: uses custom maxUnavailable value
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: null
      podDisruptionBudget.maxUnavailable: 2
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 2
      - notExists:
          path: spec.minAvailable

  - it: includes correct labels
    set:
      podDisruptionBudget.enabled: true
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: stellar-operator
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: uses fullnameOverride
    set:
      podDisruptionBudget.enabled: true
      fullnameOverride: my-custom-operator
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-operator
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: stellar-operator

  - it: works with minAvailable as string
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: "1"
    asserts:
      - equal:
          path: spec.minAvailable
          value: 1

  - it: works with maxUnavailable as percentage
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: null
      podDisruptionBudget.maxUnavailable: "25%"
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: "25%"
