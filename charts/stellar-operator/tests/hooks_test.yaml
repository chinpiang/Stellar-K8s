suite: helm-hooks
templates:
  - templates/hooks/pre-install-job.yaml
  - templates/hooks/pre-upgrade-job.yaml

tests:
  - it: renders pre-install hook by default
    template: templates/hooks/pre-install-job.yaml
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.name
          value: RELEASE-NAME-stellar-operator-pre-install
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-install
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: pre-install-hook
      - equal:
          path: spec.template.spec.containers[0].name
          value: pre-install-checks
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/stellar/stellar-k8s:0.1.0

  - it: skips pre-install hook when disabled
    template: templates/hooks/pre-install-job.yaml
    set:
      hooks.preInstall.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders pre-upgrade hook by default
    template: templates/hooks/pre-upgrade-job.yaml
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.name
          value: RELEASE-NAME-stellar-operator-pre-upgrade
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-upgrade
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: pre-upgrade-hook
      - equal:
          path: spec.template.spec.containers[0].name
          value: pre-upgrade-checks

  - it: skips pre-upgrade hook when disabled
    template: templates/hooks/pre-upgrade-job.yaml
    set:
      hooks.preUpgrade.enabled: false
    asserts:
      - hasDocuments:
          count: 0
