{{- if .Values.autoscaling.customWasm.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "stellar-operator.fullname" . }}
  labels:
    {{- include "stellar-operator.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "stellar-operator.fullname" . }}
  minReplicas: {{ .Values.autoscaling.customWasm.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.customWasm.maxReplicas }}
  metrics:
    - type: Pods
      pods:
        metric:
          name: soroban_wasm_execution_latency_milliseconds
        target:
          type: AverageValue
          averageValue: "500"
{{- end }}