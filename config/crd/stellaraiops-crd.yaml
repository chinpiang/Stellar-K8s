apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: stellaraiops.stellar.org
spec:
  group: stellar.org
  names:
    categories: []
    kind: StellarAIOps
    plural: stellaraiops
    shortNames:
    - sao
    singular: stellaraiops
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.enabled
      name: Enabled
      type: boolean
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .status.incidentCount
      name: Incidents
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: StellarAIOps defines AI-powered operations configuration
        type: object
        properties:
          spec:
            type: object
            properties:
              enabled:
                type: boolean
                default: true
                description: Enable AI-powered incident management
              anomalyDetection:
                type: object
                description: Anomaly detection configuration
                properties:
                  enabled:
                    type: boolean
                    default: true
                  threshold:
                    type: number
                    default: 0.85
                    minimum: 0
                    maximum: 1
                    description: Anomaly detection confidence threshold
              rootCauseAnalysis:
                type: object
                description: Root cause analysis configuration
                properties:
                  enabled:
                    type: boolean
                    default: true
                  confidenceThreshold:
                    type: number
                    default: 0.7
                    minimum: 0
                    maximum: 1
              automatedRemediation:
                type: object
                description: Automated remediation configuration
                properties:
                  enabled:
                    type: boolean
                    default: false
                  maxRunbookExecutions:
                    type: integer
                    default: 5
              capacityPlanning:
                type: object
                description: Capacity planning and forecasting
                properties:
                  enabled:
                    type: boolean
                    default: true
                  forecastHorizonDays:
                    type: integer
                    default: 90
          status:
            type: object
            properties:
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                      enum:
                      - "True"
                      - "False"
                      - "Unknown"
              incidentCount:
                type: integer
                default: 0
              lastAnalysisTime:
                type: string
                format: date-time
              operationalStatus:
                type: string
                enum:
                - Healthy
                - Degraded
                - Unhealthy
    served: true
    storage: true
